<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw Panel</title>
  <link rel="stylesheet" href="/style.css?v=2" />
</head>
<body>

<!-- SVG Icons Sprite -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!-- Logo mark -->
  <symbol id="ico-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
    <path d="M8 12c0-2.21 1.79-4 4-4s4 1.79 4 4-1.79 4-4 4-4-1.79-4-4z"/>
  </symbol>
  <!-- Overview -->
  <symbol id="ico-overview" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="3" width="7" height="7" rx="1.5"/>
    <rect x="14" y="3" width="7" height="7" rx="1.5"/>
    <rect x="3" y="14" width="7" height="7" rx="1.5"/>
    <rect x="14" y="14" width="7" height="7" rx="1.5"/>
  </symbol>
  <!-- Logs -->
  <symbol id="ico-logs" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
    <path d="M14 2v6h6M8 13h8M8 17h5"/>
  </symbol>
  <!-- Providers -->
  <symbol id="ico-providers" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/>
  </symbol>
  <!-- Agents -->
  <symbol id="ico-agents" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="11" width="18" height="10" rx="2"/>
    <path d="M9 11V7a3 3 0 016 0v4M9 15h.01M15 15h.01"/>
    <path d="M8 11h8"/>
  </symbol>
  <!-- Channels -->
  <symbol id="ico-channels" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
  </symbol>
  <!-- Tools -->
  <symbol id="ico-tools" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>
  </symbol>
  <!-- Skills -->
  <symbol id="ico-skills" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
  </symbol>
  <!-- Cron -->
  <symbol id="ico-cron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/>
    <path d="M12 6v6l4 2"/>
  </symbol>
  <!-- Settings -->
  <symbol id="ico-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
  </symbol>
  <!-- Sun -->
  <symbol id="ico-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="5"/>
    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
  </symbol>
  <!-- Moon -->
  <symbol id="ico-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
  </symbol>
  <!-- Plus -->
  <symbol id="ico-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <path d="M12 5v14M5 12h14"/>
  </symbol>
  <!-- Edit -->
  <symbol id="ico-edit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
    <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
  </symbol>
  <!-- Trash -->
  <symbol id="ico-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>
  </symbol>
  <!-- Test/Zap -->
  <symbol id="ico-zap" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
  </symbol>
  <!-- Check -->
  <symbol id="ico-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M20 6L9 17l-5-5"/>
  </symbol>
  <!-- X -->
  <symbol id="ico-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <path d="M18 6L6 18M6 6l12 12"/>
  </symbol>
  <!-- Warning -->
  <symbol id="ico-warning" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
    <path d="M12 9v4M12 17h.01"/>
  </symbol>
  <!-- External Link -->
  <symbol id="ico-external" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
    <polyline points="15 3 21 3 21 9"/>
    <line x1="10" y1="14" x2="21" y2="3"/>
  </symbol>
  <!-- Info -->
  <symbol id="ico-info" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/>
    <path d="M12 16v-4M12 8h.01"/>
  </symbol>
  <!-- Refresh -->
  <symbol id="ico-refresh" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M23 4v6h-6M1 20v-6h6"/>
    <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
  </symbol>
  <!-- Activity / CPU -->
  <symbol id="ico-cpu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
  </symbol>
  <!-- Memory -->
  <symbol id="ico-memory" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="6" width="20" height="12" rx="2"/>
    <path d="M6 12h.01M10 12h.01M14 12h.01M18 12h.01M6 6V4M10 6V4M14 6V4M18 6V4M6 18v2M10 18v2M14 18v2M18 18v2"/>
  </symbol>
  <!-- Disk -->
  <symbol id="ico-disk" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="12" cy="5" rx="9" ry="3"/>
    <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
    <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
  </symbol>
  <!-- Uptime / Timer -->
  <symbol id="ico-timer" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/>
    <path d="M12 6v6l4 2"/>
  </symbol>
  <!-- Server / Gateway -->
  <symbol id="ico-server" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="3" width="20" height="6" rx="2"/>
    <rect x="2" y="15" width="20" height="6" rx="2"/>
    <path d="M6 6h.01M6 18h.01"/>
  </symbol>
  <!-- Lock -->
  <symbol id="ico-lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="11" width="18" height="11" rx="2"/>
    <path d="M7 11V7a5 5 0 0110 0v4"/>
  </symbol>
  <!-- Doctor / Heart -->
  <symbol id="ico-heart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
  </symbol>
  <!-- MCP / Plug -->
  <symbol id="ico-mcp" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 2v4a2 2 0 002 2h4"/>
    <path d="M4 7V4a2 2 0 012-2h8l6 6v12a2 2 0 01-2 2H6a2 2 0 01-2-2v-1"/>
    <path d="M2 13h10M6 9l-4 4 4 4"/>
  </symbol>
  <!-- Sandbox / Box -->
  <symbol id="ico-sandbox" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/>
    <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
    <line x1="12" y1="22.08" x2="12" y2="12"/>
  </symbol>
  <!-- Brain / Memory-AI -->
  <symbol id="ico-brain" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 2a7 7 0 017 7c0 2.38-1.19 4.47-3 5.74V17a2 2 0 01-2 2h-4a2 2 0 01-2-2v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 017-7z"/>
    <path d="M9 21h6M10 17v4M14 17v4"/>
  </symbol>
  <!-- Hooks / Link -->
  <symbol id="ico-hooks" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
    <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
  </symbol>
  <!-- Menu / Hamburger -->
  <symbol id="ico-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <path d="M3 12h18M3 6h18M3 18h18"/>
  </symbol>
</svg>

<div class="app-layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo-mark">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
          <circle cx="12" cy="12" r="3" fill="currentColor" stroke="none"/>
        </svg>
      </div>
      <span class="sidebar-brand">OpenClaw Panel</span>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section" data-i18n="nav_monitor">监控</div>
      <a class="nav-item active" data-page="overview" href="#overview">
        <span class="nav-icon"><svg width="16" height="16"><use href="#ico-overview"/></svg></span>
        <span data-i18n="nav_overview">概览</span>
      </a>
      <a class="nav-item" data-page="logs" href="#logs">
        <span class="nav-icon"><svg width="16" height="16"><use href="#ico-logs"/></svg></span>
        <span data-i18n="nav_logs">日志</span>
      </a>

      <div class="nav-section" data-i18n="nav_config">配置</div>
      <a class="nav-item" data-page="providers" href="#providers">
        <span class="nav-icon"><svg width="16" height="16"><use href="#ico-providers"/></svg></span>
        <span data-i18n="nav_providers">供应商</span>
      </a>
      <a class="nav-item" data-page="agents" href="#agents">
        <span class="nav-icon"><svg width="16" height="16"><use href="#ico-agents"/></svg></span>
        <span data-i18n="nav_agents">Agent</span>
      </a>
      <a class="nav-item" data-page="channels" href="#channels">
        <span class="nav-icon"><svg width="16" height="16"><use href="#ico-channels"/></svg></span>
        <span data-i18n="nav_channels">渠道</span>
      </a>
      <a class="nav-item" data-page="tools" href="#tools">
        <span class="nav-icon"><svg width="16" height="16"><use href="#ico-tools"/></svg></span>
        <span data-i18n="nav_tools">工具</span>
      </a>
      <a class="nav-item" data-page="skills" href="#skills">
        <span class="nav-icon"><svg width="16" height="16"><use href="#ico-skills"/></svg></span>
        <span data-i18n="nav_skills">技能 & 插件</span>
      </a>
      <a class="nav-item" data-page="mcp" href="#mcp">
        <span class="nav-icon"><svg width="16" height="16"><use href="#ico-mcp"/></svg></span>
        <span data-i18n="nav_mcp">MCP 服务</span>
      </a>
      <a class="nav-item" data-page="sandbox" href="#sandbox">
        <span class="nav-icon"><svg width="16" height="16"><use href="#ico-sandbox"/></svg></span>
        <span data-i18n="nav_sandbox">沙盒</span>
      </a>
      <a class="nav-item" data-page="memory" href="#memory">
        <span class="nav-icon"><svg width="16" height="16"><use href="#ico-brain"/></svg></span>
        <span data-i18n="nav_memory">记忆</span>
      </a>
      <a class="nav-item" data-page="hooks" href="#hooks">
        <span class="nav-icon"><svg width="16" height="16"><use href="#ico-hooks"/></svg></span>
        <span data-i18n="nav_hooks">Hooks</span>
      </a>

      <div class="nav-section" data-i18n="nav_ops">运维</div>
      <a class="nav-item" data-page="quickops" href="#quickops">
        <span class="nav-icon"><svg width="16" height="16"><use href="#ico-zap"/></svg></span>
        <span data-i18n="nav_quickops">快捷操作</span>
      </a>
      <a class="nav-item" data-page="cron" href="#cron">
        <span class="nav-icon"><svg width="16" height="16"><use href="#ico-cron"/></svg></span>
        <span data-i18n="nav_cron">定时任务</span>
      </a>
      <a class="nav-item" data-page="settings" href="#settings">
        <span class="nav-icon"><svg width="16" height="16"><use href="#ico-settings"/></svg></span>
        <span data-i18n="nav_settings">设置</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="gw-status">
        <span class="status-dot dot-offline" id="gwDot"></span>
        <span id="gwStatus" data-i18n="gw_checking">检测中...</span>
      </div>
      <a class="webui-btn" id="openWebuiBtn" onclick="openWebUI()" title="打开 OpenClaw WebUI">
        <svg width="14" height="14"><use href="#ico-external"/></svg>
        <span>WebUI</span>
      </a>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-area">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleMobileSidebar()">
          <svg width="20" height="20"><use href="#ico-menu"/></svg>
        </button>
        <div class="page-title" id="pageTitle">概览</div>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-ghost btn-sm" id="langBtn">EN</button>
        <button class="theme-toggle" id="themeBtn" title="切换主题">
          <svg width="15" height="15"><use href="#ico-moon"/></svg>
        </button>
      </div>
    </header>

    <main class="content-area" id="content">
      <div class="empty-state">
        <div class="spinner"></div>
      </div>
    </main>
  </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>
<!-- Modal -->
<div id="modalContainer"></div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMobileSidebar()"></div>

<script src="/app.js"></script>
<script src="/modules/overview.js"></script>
<script src="/modules/providers.js"></script>
<script src="/modules/agents.js"></script>
<script src="/modules/channels.js"></script>
<script src="/modules/tools.js"></script>
<script src="/modules/skills.js"></script>
<script src="/modules/cron.js"></script>
<script src="/modules/logs.js"></script>
<script src="/modules/settings.js"></script>
<script src="/modules/quickops.js"></script>
<script src="/modules/mcp.js"></script>
<script src="/modules/sandbox.js"></script>
<script src="/modules/memory.js"></script>
<script src="/modules/hooks.js"></script>
<script>init();</script>
</body>
</html>
